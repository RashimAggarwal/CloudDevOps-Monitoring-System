apiVersion: v1
kind: Namespace
metadata:
  name: cloudshield
---
apiVersion: v1
kind: Service
metadata:
  name: cloudshield-backend
  namespace: cloudshield
spec:
  type: ClusterIP
  selector:
    app: cloudshield-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: cloudshield-frontend
  namespace: cloudshield
spec:
  type: ClusterIP
  selector:
    app: cloudshield-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
