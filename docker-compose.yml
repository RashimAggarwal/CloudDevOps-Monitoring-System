services:
  cloudshield-backend:
    build:
      context: ./backend
    container_name: cloudshield-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    networks:
      cloudshield-net:
        aliases:
          - cloudshield-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  cloudshield-frontend:
    build:
      context: ./frontend
    container_name: cloudshield-frontend
    depends_on:
      - cloudshield-backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - cloudshield-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cloudshield-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - cloudshield-backend
    networks:
      - cloudshield-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: cloudshield-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - cloudshield-net

networks:
  cloudshield-net:
    driver: bridge

volumes:
  grafana-data:
